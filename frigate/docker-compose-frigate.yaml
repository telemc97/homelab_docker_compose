name: frigate

services:
  frigate:
    container_name: frigate
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "256mb" # update for your cameras based on calculation above
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${BASE_PATH_FRIGATE}:/config
      - /mnt/frigate-share/media:/media/frigate
      - type: tmpfs # Optional: 1GB of memory, reduces SSD/SD Card wear
        target: /mnt/frigate-share/tmpfs
        tmpfs:
          size: 1000000000
    ports:
      - "8971:8971"
      # - "5000:5000" # Internal unauthenticated access. Expose carefully.
      - "${RTSP_PORT}:8554" # RTSP feeds
      - "${WEBRTC_TCP_PORT}:8555/tcp" # WebRTC over tcp
      - "${WEBRTC_UDP_PORT}:8555/udp" # WebRTC over udp
    environment:
      FRIGATE_RTSP_PASSWORD: ${RTSP_PASSWORD}

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}