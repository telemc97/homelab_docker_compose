name: jenkins

services:
  jenkins-dind:
    image: docker:dind
    container_name: jenkins-dind
    privileged: true
    deploy:
      resources:
        limits:
          cpus: '${JENKINS_DIND_CPU_LIMIT:-1.0}'
          memory: '${JENKINS_DIND_MEM_LIMIT:-2G}'
        reservations:
          cpus: '${JENKINS_DIND_CPU_RESERVATION:-0.2}'
          memory: '${JENKINS_DIND_MEM_RESERVATION:-512M}'
    environment:
      - DOCKER_TLS_CERTDIR=${DOCKER_TLS_CERTDIR}
    volumes:
      - ${BASE_PATH_JENKINS}/certs:/certs/client
      - ${BASE_PATH_JENKINS}/jenkins_home:/var/jenkins_home
    ports:
      - "${DAEMON_PORT}:2376"
    command: ["--storage-driver", "overlay2"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "docker", "ps"]
      interval: 30s
      timeout: 10s
      retries: 3

  jenkins:
    image: myjenkins
    container_name: jenkins
    deploy:
      resources:
        limits:
          cpus: '${JENKINS_CPU_LIMIT:-2.0}'
          memory: '${JENKINS_MEM_LIMIT:-4G}'
        reservations:
          cpus: '${JENKINS_CPU_RESERVATION:-0.5}'
          memory: '${JENKINS_MEM_RESERVATION:-1G}'
    environment:
      - DOCKER_HOST=${DOCKER_HOST}
      - DOCKER_CERT_PATH=${DOCKER_CERT_PATH}
      - DOCKER_TLS_VERIFY=${DOCKER_TLS_VERIFY}
    user: root
    volumes:
      - ${BASE_PATH_JENKINS}/jenkins_home:/var/jenkins_home
      - ${BASE_PATH_JENKINS}/certs:/certs/client:ro
    ports:
      - ${JENKINS_WEBUI_PORT}:8080
      - ${TCP_PORT}:50000
    restart: on-failure
    depends_on:
      jenkins-dind:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Tools on agent_0 terraform, ansible
  agent_0:
    image: agent_0
    container_name: agent_0
    privileged: true
    user: root
    deploy:
      resources:
        limits:
          cpus: '${AGENT_0_CPU_LIMIT:-2.0}'
          memory: '${AGENT_0_MEM_LIMIT:-2G}'
        reservations:
          cpus: '${AGENT_0_CPU_RESERVATION:-0.5}'
          memory: '${AGENT_0_MEM_RESERVATION:-512M}'
    ports:
      - ${AGENT_0_SSH_PORT}:22
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBLIC_KEY}
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Tools on agent_1: cpp, cmake, gcc, make, etc
  agent_1:
    image: agent_1
    container_name: agent_1
    privileged: true
    user: root
    deploy:
      resources:
        limits:
          cpus: '${AGENT_1_CPU_LIMIT:-2.0}'
          memory: '${AGENT_1_MEM_LIMIT:-2G}'
        reservations:
          cpus: '${AGENT_1_CPU_RESERVATION:-0.5}'
          memory: '${AGENT_1_MEM_RESERVATION:-512M}'
    ports:
      - ${AGENT_1_SSH_PORT}:22
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBLIC_KEY}
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Latex Building
  agent_2:
    image: agent_2
    container_name: agent_2
    privileged: true
    user: root
    deploy:
      resources:
        limits:
          cpus: '${AGENT_2_CPU_LIMIT:-2.0}'
          memory: '${AGENT_2_MEM_LIMIT:-2G}'
        reservations:
          cpus: '${AGENT_2_CPU_RESERVATION:-0.5}'
          memory: '${AGENT_2_MEM_RESERVATION:-512M}'
    ports:
      - ${AGENT_2_SSH_PORT}:22
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBLIC_KEY}
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "sshd"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}