name: home_apps

services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    ports:
      - ${HASS_PORT}:8123
    volumes:
      - ${BASE_PATH_HOMEASSISTANT}/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '${HASS_CPU_LIMIT:-0.5}'
          memory: ${HASS_MEM_LIMIT:-512M}
        reservations:
          cpus: '${HASS_CPU_RESERVATION:-0.1}'
          memory: ${HASS_MEM_RESERVATION:-128M}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 3

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt
    container_name: zigbee2mqtt  
    restart: unless-stopped
    environment:
      - TZ=Europe/Athens
    devices:  
      - /dev/ttyACM0:/dev/ttyACM0  
    ports:  
      - ${ZIGBEE2MQTT_WEBUI_PORT}:8080
    volumes:  
      - ${BASE_PATH_ZIGBEE2MQTT}/data:/app/data  
      - /run/udev:/run/udev:ro
    networks:
      default:
        ipv4_address: ${ZIGBEE2MQTT_IPV4}
    deploy:
      resources:
        limits:
          cpus: '${ZIGBEE2MQTT_CPU_LIMIT:-0.5}'
          memory: ${ZIGBEE2MQTT_MEM_LIMIT:-512M}
        reservations:
          cpus: '${ZIGBEE2MQTT_CPU_RESERVATION:-0.1}'
          memory: ${ZIGBEE2MQTT_MEM_RESERVATION:-128M}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    restart: unless-stopped  
    volumes:
      - ${BASE_PATH_MOSQUITTO}:/mosquitto
      - ${BASE_PATH_MOSQUITTO}/data:/mosquitto/data
      - ${BASE_PATH_MOSQUITTO}/log:/mosquitto/log
    ports:
      - ${MOSQUITTO_MQTT_PORT}:1883
      - ${MOSQUITTO_WEBSOCKETS_PORT}:9001
    networks:
      default:
        ipv4_address: ${MOSQUITTO_IPV4}
    deploy:
      resources:
        limits:
          cpus: '${MOSQUITTO_CPU_LIMIT:-0.5}'
          memory: ${MOSQUITTO_MEM_LIMIT:-512M}
        reservations:
          cpus: '${MOSQUITTO_CPU_RESERVATION:-0.1}'
          memory: ${MOSQUITTO_MEM_RESERVATION:-128M}
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$SYS/#", "-C", "1", "-u", "healthcheck", "-P", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}
