name: gitea

services:
  server:
    image: docker.gitea.com/gitea:1.25.4
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:${DB_PORT}
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${USER}
      - GITEA__database__PASSWD=${PASSWORD}
      - GITEA__server__ROOT_URL=${ROOT_URL}
    restart: always
    volumes:
      - ${MAIN_PATH}/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - ${GITEA_WEBUI_PORT}:3000
      - ${GITEA_SSH_PORT}:22
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '${GITEA_CPU_LIMIT:-0.5}'
          memory: ${GITEA_MEM_LIMIT:-512M}
        reservations:
          cpus: '${GITEA_CPU_RESERVATION:-0.1}'
          memory: ${GITEA_MEM_RESERVATION:-128M}

  db:
    image: docker.io/library/postgres:14
    container_name: gitea_db
    restart: always
    environment:
      - POSTGRES_USER=${USER}
      - POSTGRES_PASSWORD=${PASSWORD}
      - POSTGRES_DB=gitea
    volumes:
      - ${MAIN_PATH}/postgres:/var/lib/postgresql/data
    ports:
      - ${DB_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER} -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '${GITEA_DB_CPU_LIMIT:-1.0}'
          memory: ${GITEA_DB_MEM_LIMIT:-1G}
        reservations:
          cpus: '${GITEA_DB_CPU_RESERVATION:-0.2}'
          memory: ${GITEA_DB_MEM_RESERVATION:-256M}

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}