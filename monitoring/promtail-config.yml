server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: system
  static_configs:
  - targets:
      - localhost
    labels:
      job: varlogs
      __path__: /var/log/*log
  pipeline_stages:
    - regex:
        expression: "(?i)(level|lvl|[\\[])?[=]?\\s*(?P<extracted_level>info|warn|error|debug|critical|fatal|err|wrn|dbg|inf)"
    - template:
        source: level
        template: '{{ if .extracted_level }}{{ .extracted_level | toupper }}{{ else }}INFO{{ end }}'
    - labels:
        level:

- job_name: docker
  docker_sd_configs:
    - host: unix:///var/run/docker.sock
      refresh_interval: 5s
  relabel_configs:
    - source_labels: ['__meta_docker_container_name']
      regex: '/(.*)'
      target_label: 'container'
    - source_labels: ['__meta_docker_container_log_path']
      target_label: '__path__'
  pipeline_stages:
    - docker: {}
    - regex:
        expression: "(?i)(level|lvl|[\\[])?[=]?\\s*(?P<extracted_level>info|warn|error|debug|critical|fatal|err|wrn|dbg|inf)"
    - template:
        source: level
        template: '{{ if .extracted_level }}{{ .extracted_level | toupper }}{{ else }}INFO{{ end }}'
    - labels:
        level:
