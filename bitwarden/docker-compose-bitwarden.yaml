name: bitwarden

services:
  mssql:
    image: ghcr.io/bitwarden/mssql:latest
    container_name: bitwarden-mssql
    restart: always
    stop_grace_period: 60s
    volumes:
      - ${STORAGE_PATH}/mssql/data:/var/opt/mssql/data
      - ${STORAGE_PATH}/logs/mssql:/var/opt/mssql/log
      - ${STORAGE_PATH}/mssql/backups:/etc/bitwarden/mssql/backups
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '${BW_MSSQL_CPU_LIMIT:-1.0}'
          memory: ${BW_MSSQL_MEM_LIMIT:-1G}
        reservations:
          cpus: '${BW_MSSQL_CPU_RESERVATION:-0.2}'
          memory: ${BW_MSSQL_MEM_RESERVATION:-256M}

  web:
    image: ghcr.io/bitwarden/web:latest
    container_name: bitwarden-web
    restart: always
    volumes:
      - ${STORAGE_PATH}/web:/etc/bitwarden/web
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_WEB_CPU_LIMIT:-0.5}'
          memory: ${BW_WEB_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_WEB_CPU_RESERVATION:-0.1}'
          memory: ${BW_WEB_MEM_RESERVATION:-128M}

  attachments:
    image: ghcr.io/bitwarden/attachments:latest
    container_name: bitwarden-attachments
    restart: always
    volumes:
      - ${STORAGE_PATH}/core/attachments:/etc/bitwarden/core/attachments
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_ATTACHMENTS_CPU_LIMIT:-0.5}'
          memory: ${BW_ATTACHMENTS_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_ATTACHMENTS_CPU_RESERVATION:-0.1}'
          memory: ${BW_ATTACHMENTS_MEM_RESERVATION:-128M}

  api:
    image: ghcr.io/bitwarden/api:latest
    container_name: bitwarden-api
    restart: always
    volumes:
      - ${STORAGE_PATH}/core:/etc/bitwarden/core
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/api:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_API_CPU_LIMIT:-0.5}'
          memory: ${BW_API_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_API_CPU_RESERVATION:-0.1}'
          memory: ${BW_API_MEM_RESERVATION:-128M}

  identity:
    image: ghcr.io/bitwarden/identity:latest
    container_name: bitwarden-identity
    restart: always
    volumes:
      - ${STORAGE_PATH}/identity:/etc/bitwarden/identity
      - ${STORAGE_PATH}/core:/etc/bitwarden/core
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/identity:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_IDENTITY_CPU_LIMIT:-0.5}'
          memory: ${BW_IDENTITY_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_IDENTITY_CPU_RESERVATION:-0.1}'
          memory: ${BW_IDENTITY_MEM_RESERVATION:-128M}

  sso:
    image: ghcr.io/bitwarden/sso:latest
    container_name: bitwarden-sso
    restart: always
    volumes:
      - ${STORAGE_PATH}/identity:/etc/bitwarden/identity
      - ${STORAGE_PATH}/core:/etc/bitwarden/core
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/sso:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_SSO_CPU_LIMIT:-0.5}'
          memory: ${BW_SSO_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_SSO_CPU_RESERVATION:-0.1}'
          memory: ${BW_SSO_MEM_RESERVATION:-128M}

  admin:
    image: ghcr.io/bitwarden/admin:latest
    container_name: bitwarden-admin
    restart: always
    depends_on:
      - mssql
    volumes:
      - ${STORAGE_PATH}/core:/etc/bitwarden/core
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/admin:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_ADMIN_CPU_LIMIT:-0.5}'
          memory: ${BW_ADMIN_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_ADMIN_CPU_RESERVATION:-0.1}'
          memory: ${BW_ADMIN_MEM_RESERVATION:-128M}

  icons:
    image: ghcr.io/bitwarden/icons:latest
    container_name: bitwarden-icons
    restart: always
    volumes:
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/icons:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_ICONS_CPU_LIMIT:-0.5}'
          memory: ${BW_ICONS_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_ICONS_CPU_RESERVATION:-0.1}'
          memory: ${BW_ICONS_MEM_RESERVATION:-128M}

  notifications:
    image: ghcr.io/bitwarden/notifications:latest
    container_name: bitwarden-notifications
    restart: always
    volumes:
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/notifications:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_NOTIFICATIONS_CPU_LIMIT:-0.5}'
          memory: ${BW_NOTIFICATIONS_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_NOTIFICATIONS_CPU_RESERVATION:-0.1}'
          memory: ${BW_NOTIFICATIONS_MEM_RESERVATION:-128M}

  events:
    image: ghcr.io/bitwarden/events:latest
    container_name: bitwarden-events
    restart: always
    volumes:
      - ${STORAGE_PATH}/ca-certificates:/etc/bitwarden/ca-certificates
      - ${STORAGE_PATH}/logs/events:/etc/bitwarden/logs
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_EVENTS_CPU_LIMIT:-0.5}'
          memory: ${BW_EVENTS_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_EVENTS_CPU_RESERVATION:-0.1}'
          memory: ${BW_EVENTS_MEM_RESERVATION:-128M}

  nginx:
    image: ghcr.io/bitwarden/nginx:latest
    container_name: bitwarden-nginx
    restart: always
    depends_on:
      - web
      - admin
      - api
      - identity
    ports:
      - ${BITWARDEN_PORT}:8080
    volumes:
      - ${STORAGE_PATH}/nginx:/etc/bitwarden/nginx
      - ${STORAGE_PATH}/letsencrypt:/etc/letsencrypt
      - ${STORAGE_PATH}/ssl:/etc/ssl
      - ${STORAGE_PATH}/logs/nginx:/var/log/nginx
    networks:
      - default
      - public
    deploy:
      resources:
        limits:
          cpus: '${BW_NGINX_CPU_LIMIT:-0.5}'
          memory: ${BW_NGINX_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BW_NGINX_CPU_RESERVATION:-0.1}'
          memory: ${BW_NGINX_MEM_RESERVATION:-128M}

networks:
  default:
    internal: true
    ipam:
      driver: default
      config: 
        - subnet: ${SUBNET}
  public:
    internal: false
  caddy_shared:
    external: true
