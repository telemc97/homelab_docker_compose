#
# WARNING: To install Immich, follow our guide: https://immich.app/docs/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    deploy:
      resources:
        limits:
          cpus: '${IMMICH_SERVER_CPU_LIMIT:-1.0}'
          memory: '${IMMICH_SERVER_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${IMMICH_SERVER_CPU_RESERVATION:-0.2}'
          memory: '${IMMICH_SERVER_MEM_RESERVATION:-256M}'
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    logging:
      driver: "journald"
      options:
        tag: "immich-server"
    ports:
      - '${IMMICH_WEBUI_PORT}:2283'
    depends_on:
      - redis
      - database
    restart: always

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    deploy:
      resources:
        limits:
          cpus: '${IMMICH_ML_CPU_LIMIT:-2.0}'
          memory: '${IMMICH_ML_MEM_LIMIT:-4G}'
        reservations:
          cpus: '${IMMICH_ML_CPU_RESERVATION:-0.5}'
          memory: '${IMMICH_ML_MEM_RESERVATION:-1G}'
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:148bb5411c184abd288d9aaed139c98123eeb8824c5d3fce03cf721db58066d8
    deploy:
      resources:
        limits:
          cpus: '${IMMICH_REDIS_CPU_LIMIT:-0.5}'
          memory: '${IMMICH_REDIS_MEM_LIMIT:-256M}'
        reservations:
          cpus: '${IMMICH_REDIS_CPU_RESERVATION:-0.1}'
          memory: '${IMMICH_REDIS_MEM_RESERVATION:-128M}'
    restart: always

  database:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:739cdd626151ff1f796dc95a6591b55a714f341c737e27f045019ceabf8e8c52
    deploy:
      resources:
        limits:
          cpus: '${IMMICH_DB_CPU_LIMIT:-1.0}'
          memory: '${IMMICH_DB_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${IMMICH_DB_CPU_RESERVATION:-0.2}'
          memory: '${IMMICH_DB_MEM_RESERVATION:-256M}'
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    command: >-
      postgres -c shared_preload_libraries=vectors.so -c 'search_path="$$user", public, vectors' -c logging_collector=on -c max_wal_size=2GB -c shared_buffers=512MB -c wal_compression=on
    restart: always

volumes:
  model-cache:

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}
