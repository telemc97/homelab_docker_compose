name: bookstack

services:

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Athens
      # APP_URL must be set as the base URL you'd expect to access BookStack
      # on via the browser. The default shown here is what you might use if accessing
      # direct from the browser on the docker host, hence the use of the port as configured below.
      - APP_URL=${APP_URL}
      # APP_KEY must be a unique key. Generate your own by running
      # docker run -it --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey
      # You should keep the "base64:" part for the option value.
      - APP_KEY=${APP_KEY}

      # The below database details are purposefully aligned with those
      # configuted for the "mariadb" service below:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE}
      - DB_USERNAME=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ${BASE_PATH_BOOKSTACK}:/config
    ports:
      - ${BOOKSTACK_PORT}:80
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${BOOKSTACK_CPU_LIMIT:-0.5}'
          memory: ${BOOKSTACK_MEM_LIMIT:-512M}
        reservations:
          cpus: '${BOOKSTACK_CPU_RESERVATION:-0.1}'
          memory: ${BOOKSTACK_MEM_RESERVATION:-128M}

  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.4
    container_name: mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Athens
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ${BASE_PATH_BOOKSTACK}/db:/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${MARIADB_CPU_LIMIT:-1.0}'
          memory: ${MARIADB_MEM_LIMIT:-1G}
        reservations:
          cpus: '${MARIADB_CPU_RESERVATION:-0.2}'
          memory: ${MARIADB_MEM_RESERVATION:-256M}

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}