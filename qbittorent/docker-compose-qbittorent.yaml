name: qbittorrent

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    deploy:
      resources:
        limits:
          cpus: '${QBIT_CPU_LIMIT:-1.0}'
          memory: '${QBIT_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${QBIT_CPU_RESERV:-0.2}'
          memory: '${QBIT_MEM_RESERV:-256M}'
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Athens
      - WEBUI_PORT=${QBIT_WEBUI_PORT}
      - TORRENTING_PORT=6881
    volumes:
      - ${BASE_PATH_QBITTORRENT}/appdata:/config
      - /mnt/torrents-share/downloads:/downloads
    restart: unless-stopped
    network_mode: "service:gluetun"

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    deploy:
      resources:
        limits:
          cpus: '${GLUETUN_CPU_LIMIT:-0.5}'
          memory: '${GLUETUN_MEM_LIMIT:-512M}'
        reservations:
          cpus: '${GLUETUN_CPU_RESERV:-0.1}'
          memory: '${GLUETUN_MEM_RESERV:-128M}'
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
    volumes:
      - ${BASE_PATH_GLUETUN}:/gluetun
    ports:
      - ${QBIT_WEBUI_PORT}:${QBIT_WEBUI_PORT}
      - ${QBIT_TCP_PORT}:6881
      - ${QBIT_UDP_PORT}:6881/udp
    restart: always

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}