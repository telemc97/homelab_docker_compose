name: trek

services:
  trek:
    image: mauriceboe/trek:latest
    container_name: trek
    deploy:
      resources:
        limits:
          cpus: '${TREK_CPU_LIMIT:-0.5}'
          memory: '${TREK_MEM_LIMIT:-512M}'
        reservations:
          cpus: '${TREK_CPU_RESERVATION:-0.1}'
          memory: '${TREK_MEM_RESERVATION:-128M}'
    ports:
      - "${UI_PORT}:${UI_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${UI_PORT}
    volumes:
      - ${BASE_PATH_TREK}/data:/app/data
      - ${BASE_PATH_TREK}/uploads:/app/uploads
    restart: unless-stopped

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}