name: media_stack

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: media-stack-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: always
    deploy:
      resources:
        limits:
          cpus: '${GLUETUN_CPU_LIMIT:-0.5}'
          memory: '${GLUETUN_MEM_LIMIT:-512M}'
        reservations:
          cpus: '${GLUETUN_CPU_RESERVATION:-0.1}'
          memory: '${GLUETUN_MEM_RESERVATION:-128M}'
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - TZ=${TZ}
      - DOT=on
      - BLOCK_MALICIOUS=on
      - DNS_KEEP_NAMESERVER=on
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 5s
      timeout: 10s
      retries: 1
      start_period: 10s
    volumes:
      - ${BASE_PATH_GLUETUN}:/gluetun
    ports:
      # Jellyfin
      - ${JELLYFIN_PORT}:8096
      # Sonarr
      - ${SONARR_PORT}:8989
      # Radarr
      - ${RADARR_PORT}:7878
      # Bazarr
      - ${BAZARR_PORT}:6767
      # Seerr
      - ${SEERR_PORT}:5055
      # Prowlarr
      - ${PROWLARR_PORT}:9696
      # qBittorrent
      - ${QBIT_WEBUI_PORT}:${QBIT_WEBUI_PORT}
      - ${QBIT_TCP_PORT}:6881
      - ${QBIT_UDP_PORT}:6881/udp

  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_VERSION:-latest}
    container_name: jellyfin
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${JELLYFIN_CPU_LIMIT:-2.0}'
          memory: '${JELLYFIN_MEM_LIMIT:-4G}'
        reservations:
          cpus: '${JELLYFIN_CPU_RESERVATION:-0.5}'
          memory: '${JELLYFIN_MEM_RESERVATION:-512M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${BASE_PATH_JELLYFIN}/config:/config
      - ${MEDIA_ROOT}:/data
    devices:
      - /dev/dri:/dev/dri

  sonarr:
    image: lscr.io/linuxserver/sonarr:${SONARR_VERSION:-latest}
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${SONARR_CPU_LIMIT:-0.5}'
          memory: '${SONARR_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${SONARR_CPU_RESERVATION:-0.1}'
          memory: '${SONARR_MEM_RESERVATION:-256M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${BASE_PATH_SONARR}/config:/config
      - ${MEDIA_ROOT}:/data

  radarr:
    image: lscr.io/linuxserver/radarr:${RADARR_VERSION:-latest}
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${RADARR_CPU_LIMIT:-0.5}'
          memory: '${RADARR_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${RADARR_CPU_RESERVATION:-0.1}'
          memory: '${RADARR_MEM_RESERVATION:-256M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${BASE_PATH_RADARR}/config:/config
      - ${MEDIA_ROOT}:/data

  bazarr:
    image: lscr.io/linuxserver/bazarr:${BAZARR_VERSION:-latest}
    container_name: bazarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${BAZARR_CPU_LIMIT:-0.5}'
          memory: '${BAZARR_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${BAZARR_CPU_RESERVATION:-0.1}'
          memory: '${BAZARR_MEM_RESERVATION:-256M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${BASE_PATH_BAZARR}/config:/config
      - ${MEDIA_ROOT}:/data

  seerr:
    image: ghcr.io/seerr-team/seerr:${SEERR_VERSION:-latest}
    container_name: seerr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${SEERR_CPU_LIMIT:-0.5}'
          memory: '${SEERR_MEM_LIMIT:-512M}'
        reservations:
          cpus: '${SEERR_CPU_RESERVATION:-0.1}'
          memory: '${SEERR_MEM_RESERVATION:-128M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LOG_LEVEL=${SEERR_LOG_LEVEL:-info}
    volumes:
      - ${BASE_PATH_SEERR}/config:/app/config

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_VERSION:-latest}
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${PROWLARR_CPU_LIMIT:-0.5}'
          memory: '${PROWLARR_MEM_LIMIT:-512M}'
        reservations:
          cpus: '${PROWLARR_CPU_RESERVATION:-0.1}'
          memory: '${PROWLARR_MEM_RESERVATION:-128M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${BASE_PATH_PROWLARR}/config:/app/config

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${FLARESOLVERR_CPU_LIMIT:-0.5}'
          memory: '${FLARESOLVERR_MEM_LIMIT:-512M}'
        reservations:
          cpus: '${FLARESOLVERR_CPU_RESERVATION:-0.1}'
          memory: '${FLARESOLVERR_MEM_RESERVATION:-128M}'
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - TZ=${TZ}

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    user: ${PUID}:${PGID}
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${RECYCLARR_CPU_LIMIT:-0.5}'
          memory: '${RECYCLARR_MEM_LIMIT:-256M}'
        reservations:
          cpus: '${RECYCLARR_CPU_RESERVATION:-0.1}'
          memory: '${RECYCLARR_MEM_RESERVATION:-64M}'
    environment:
      - TZ=${TZ}
    volumes:
      - ${BASE_PATH_RECYCLARR}/config:/config

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${QBIT_VERSION:-latest}
    container_name: media-stack-qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${QBIT_CPU_LIMIT:-1.0}'
          memory: '${QBIT_MEM_LIMIT:-1G}'
        reservations:
          cpus: '${QBIT_CPU_RESERVATION:-0.2}'
          memory: '${QBIT_MEM_RESERVATION:-256M}'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBIT_WEBUI_PORT}
      - TORRENTING_PORT=6881
    volumes:
      - ${BASE_PATH_QBITTORRENT}/config:/config
      - ${MEDIA_ROOT}:/data

networks:
  default:
    ipam:  
      driver: default
      config: 
        - subnet: ${SUBNET}
